<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archive — My Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="archive.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <a class="nav-logo" href="index.html">My Blog</a>
    <span class="nav-tagline">Thoughts, stories &amp; ideas</span>
    <div class="nav-actions">
      <a class="nav-link" href="archive.html" style="color: var(--primary);">Archive</a>
      <a href="index.html">
        <button class="btn btn-primary">
          <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
          Write your own
        </button>
      </a>
    </div>
  </nav>

  <!-- ARCHIVE -->
  <main>
    <div class="archive-header">
      <h1>Archive</h1>
      <p>All published thoughts and stories.</p>
    </div>

    <div class="search-wrap">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-input" type="text" id="search-input" placeholder="Search the archive..." oninput="onSearch(this.value)" />
    </div>

    <div class="articles-list" id="articles-list"></div>
  </main>

  <!-- READ OVERLAY -->
  <div class="overlay" id="read-overlay">
    <div class="overlay-hero">
      <img id="overlay-img" src="" alt="" />
      <div class="overlay-hero-tint"></div>
    </div>
    <div class="overlay-body">
      <div class="overlay-card">
        <div class="overlay-meta">
          <button class="overlay-close" onclick="closeOverlay()">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            Archive
          </button>
          <div class="overlay-divider"></div>
          <span id="overlay-author"></span>
          <span id="overlay-date"></span>
        </div>
        <h1 class="overlay-title" id="overlay-title"></h1>
        <div class="overlay-content" id="overlay-content"></div>
      </div>
    </div>
  </div>

  <script src="archive.js"></script>
</body>
</html>
