<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
 <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <a class="nav-logo" href="index.html">My Blog</a>
    <span class="nav-tagline">Thoughts, stories &amp; ideas</span>
    <div class="nav-actions">
      <a class="nav-link" href="archive.html">Archive</a>
      <a class="nav-link hidden" href="archive.html"><span class="material-symbols-outlined">archive</span></a>
      <button class="btn btn-primary" onclick="showView('write')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
        Write your own
      </button>
      <button class="btn btn-primary hidden" onclick="showView('write')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      </button>
    </div>
  </nav>

  <!-- ── HOME VIEW ── -->
  <div id="view-home" class="view active">
    <!-- Search -->
    <div class="search-wrap">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input class="search-input" type="text" id="search-input" placeholder="Search articles..." oninput="onSearch(this.value)" />
    </div>

    <!-- Featured split -->
    <div id="featured-section" class="featured-grid"></div>

    <!-- Search results (hidden by default) -->
    <div id="search-results" class="search-results" style="display:none;"></div>
  </div>

  <!-- ── WRITE VIEW ── -->
  <div id="view-write" class="view">
    <div class="write-form-wrap">
      <button class="write-back" onclick="showView('home')">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
        Back to home
      </button>
      <h1>Write an Article</h1>
      <p>Share your thoughts with the world.</p>
      <form class="write-form" onsubmit="publishArticle(event)">
        <div class="field">
          <label for="input-title">Title</label>
          <input type="text" id="input-title" placeholder="The Art of Noticing" required />
        </div>
        <div class="field-row">
          <div class="field">
            <label for="input-author">Author Name</label>
            <input type="text" id="input-author" placeholder="Jane Doe" required />
          </div>
          <div class="field">
            <label for="input-cover">Cover Image URL (Optional)</label>
            <input type="url" id="input-cover" placeholder="https://images.unsplash.com/..." />
          </div>
        </div>
        <div class="field">
          <label for="input-excerpt">Excerpt</label>
          <textarea id="input-excerpt" placeholder="A brief summary of your article..." required></textarea>
          <span class="field-hint">Shown on article cards and search results.</span>
        </div>
        <div class="field">
          <label for="input-content">Content</label>
          <textarea id="input-content" placeholder="Write your story here..." required></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary" style="padding: 0.7rem 2rem; font-size: 1rem;">Publish Article</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ── READ VIEW ── -->
  <div id="view-read" class="view">
    <div class="read-hero">
      <img id="read-hero-img" src="" alt="" />
      <div class="read-hero-overlay"></div>
    </div>
    <div class="read-content-wrap">
      <div class="read-card">
        <div class="read-meta-bar">
          <button class="read-back-btn" onclick="showView('home')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
            Home
          </button>
          <div class="read-divider"></div>
          <span id="read-author"></span>
          <span id="read-date"></span>
        </div>
        <h1 class="read-title" id="read-title"></h1>
        <div class="read-body" id="read-body"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
